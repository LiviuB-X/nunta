<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandra & Liviu — 25 iulie 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white:      #FFFFFF;
    --off-white:  #F8F7F3;
    --olive-100:  #E2E6CC;
    --olive-200:  #C8CEA3;
    --olive-400:  #8D9660;
    --olive-600:  #5C6637;
    --olive-800:  #353C1E;
    --warm-gray:  #9A978E;
    --text:       #2C2E24;
    --text-muted: #7A7D6F;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(141,150,96,0.025) 3px, rgba(141,150,96,0.025) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(141,150,96,0.025) 3px, rgba(141,150,96,0.025) 4px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20vh; right: -20vw;
    width: 70vmax; height: 70vmax;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(140,150,96,0.07) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 4rem;
  }

  .sprig-top, .sprig-bottom {
    width: 160px;
    opacity: 0;
  }
  .sprig-top {
    margin-bottom: -12px;
    animation: fadeIn 1.2s ease 0.1s forwards;
  }
  .sprig-bottom {
    margin-top: -12px;
    transform: scaleY(-1);
    animation: fadeIn 1.2s ease 0.9s forwards;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--olive-100);
    border-radius: 4px;
    padding: 3rem 2.75rem 2.75rem;
    max-width: 440px;
    width: 100%;
    text-align: center;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.3s forwards;
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--olive-200);
    border-style: solid;
  }
  .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  .card-inner { position: relative; }
  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--olive-200);
    border-style: solid;
  }
  .card-inner::before { top: -1.8rem; right: -1.5rem; border-width: 1px 1px 0 0; }
  .card-inner::after  { bottom: -1.5rem; left: -1.5rem; border-width: 0 0 1px 1px; }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--olive-400);
    margin-bottom: 1rem;
    animation: fadeUp 0.7s ease 0.5s both;
  }

  .names {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8.5vw, 50px);
    font-weight: 400;
    line-height: 1.15;
    color: var(--olive-800);
    animation: fadeUp 0.7s ease 0.58s both;
  }
  .names em { font-style: italic; color: var(--olive-600); }
  .amp {
    display: block;
    font-style: italic;
    font-size: 0.65em;
    color: var(--olive-200);
    line-height: 1.1;
    margin: 0.05em 0;
  }

  .date-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1rem;
    animation: fadeUp 0.7s ease 0.65s both;
  }
  .date-line-el { flex: 1; max-width: 50px; height: 1px; background: var(--olive-100); }
  .date-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--warm-gray);
  }

  .leaf-divider {
    margin: 1.75rem auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    animation: fadeUp 0.7s ease 0.72s both;
  }
  .leaf-line   { width: 44px; height: 1px; background: var(--olive-100); }
  .leaf-dot    { width: 6px; height: 6px; border-radius: 50%; background: var(--olive-200); }
  .leaf-diamond{ width: 6px; height: 6px; background: var(--olive-400); transform: rotate(45deg); flex-shrink: 0; }

  .message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
    line-height: 1.9;
    color: var(--text-muted);
    margin-bottom: 2rem;
    padding: 0 0.25rem;
    animation: fadeUp 0.7s ease 0.78s both;
  }

  .btn-wrap { animation: fadeUp 0.7s ease 0.86s both; }

  .btn-upload {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    padding: 14px 24px;
    background: var(--olive-600);
    border: none;
    border-radius: 2px;
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .btn-upload:hover { background: var(--olive-800); transform: translateY(-1px); }
  .btn-upload:active { transform: translateY(0); }

  .btn-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }

  .btn-hint {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--olive-200);
    margin-top: 0.7rem;
    text-transform: uppercase;
  }

  .footer-note {
    margin-top: 2.5rem;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--olive-200);
    opacity: 0;
    animation: fadeIn 1s ease 1.1s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 480px) {
    .card { padding: 2.25rem 1.75rem; }
    .names { font-size: 38px; }
    .message { font-size: 15px; }
    .sprig-top, .sprig-bottom { width: 120px; }
  }
</style>
</head>
