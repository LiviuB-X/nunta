<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandra & Liviu — 25 iulie 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white:      #FFFFFF;
    --off-white:  #F8F7F3;
    --olive-100:  #E2E6CC;
    --olive-200:  #C8CEA3;
    --olive-400:  #8D9660;
    --olive-600:  #5C6637;
    --olive-800:  #353C1E;
    --warm-gray:  #9A978E;
    --text:       #2C2E24;
    --text-muted: #7A7D6F;
    --success:    #4a7c4e;
    --error:      #8B3A3A;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(141,150,96,0.025) 3px, rgba(141,150,96,0.025) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(141,150,96,0.025) 3px, rgba(141,150,96,0.025) 4px);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; top: -20vh; right: -20vw;
    width: 70vmax; height: 70vmax; border-radius: 50%;
    background: radial-gradient(circle, rgba(140,150,96,0.07) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 1.5rem 4rem;
  }

  .sprig-top, .sprig-bottom { width: 160px; opacity: 0; }
  .sprig-top   { margin-bottom: -12px; animation: fadeIn 1.2s ease 0.1s forwards; }
  .sprig-bottom{ margin-top: -12px; transform: scaleY(-1); animation: fadeIn 1.2s ease 0.9s forwards; }

  .card {
    background: var(--white);
    border: 1px solid var(--olive-100);
    border-radius: 4px;
    padding: 3rem 2.75rem 2.75rem;
    max-width: 460px; width: 100%;
    text-align: center; position: relative;
    opacity: 0; animation: fadeUp 0.9s ease 0.3s forwards;
  }
  .card::before, .card::after {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    border-color: var(--olive-200); border-style: solid;
  }
  .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }
  .card-inner { position: relative; }
  .card-inner::before, .card-inner::after {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    border-color: var(--olive-200); border-style: solid;
  }
  .card-inner::before { top: -1.8rem; right: -1.5rem; border-width: 1px 1px 0 0; }
  .card-inner::after  { bottom: -1.5rem; left: -1.5rem; border-width: 0 0 1px 1px; }

  .eyebrow {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--olive-400); margin-bottom: 1rem;
    animation: fadeUp 0.7s ease 0.5s both;
  }
  .names {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8.5vw, 50px);
    font-weight: 400; line-height: 1.15;
    color: var(--olive-800);
    animation: fadeUp 0.7s ease 0.58s both;
  }
  .names em { font-style: italic; color: var(--olive-600); }
  .amp {
    display: block; font-style: italic;
    font-size: 0.65em; color: var(--olive-200);
    line-height: 1.1; margin: 0.05em 0;
  }
  .date-row {
    display: flex; align-items: center;
    justify-content: center; gap: 10px;
    margin-top: 1rem;
    animation: fadeUp 0.7s ease 0.65s both;
  }
  .date-line-el { flex: 1; max-width: 50px; height: 1px; background: var(--olive-100); }
  .date-text { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--warm-gray); }

  .leaf-divider {
    margin: 1.75rem auto;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    animation: fadeUp 0.7s ease 0.72s both;
  }
  .leaf-line    { width: 44px; height: 1px; background: var(--olive-100); }
  .leaf-dot     { width: 6px; height: 6px; border-radius: 50%; background: var(--olive-200); }
  .leaf-diamond { width: 6px; height: 6px; background: var(--olive-400); transform: rotate(45deg); flex-shrink: 0; }

  .message {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 16px;
    line-height: 1.9; color: var(--text-muted);
    margin-bottom: 2rem; padding: 0 0.25rem;
    animation: fadeUp 0.7s ease 0.78s both;
  }

  /* ── UPLOAD ZONE ── */
  .upload-area {
    animation: fadeUp 0.7s ease 0.86s both;
  }

  #file-input { display: none; }

  .btn-upload {
    display: inline-flex; align-items: center;
    justify-content: center; gap: 9px;
    width: 100%; padding: 14px 24px;
    background: var(--olive-600);
    border: none; border-radius: 2px;
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .btn-upload:hover { background: var(--olive-800); transform: translateY(-1px); }
  .btn-upload:active { transform: translateY(0); }
  .btn-upload:disabled { background: var(--olive-200); cursor: not-allowed; transform: none; }
  .btn-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }

  /* selected files preview */
  .files-preview {
    display: none;
    margin-top: 1rem;
    text-align: left;
    border: 1px solid var(--olive-100);
    border-radius: 4px;
    overflow: hidden;
  }
  .files-preview.visible { display: block; }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    font-size: 12px; color: var(--text-muted);
    border-bottom: 1px solid var(--olive-100);
  }
  .file-item:last-child { border-bottom: none; }
  .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 10px; color: var(--olive-200); flex-shrink: 0; }
  .file-status { font-size: 11px; flex-shrink: 0; min-width: 60px; text-align: right; }
  .file-status.waiting  { color: var(--warm-gray); }
  .file-status.uploading{ color: var(--olive-400); }
  .file-status.done     { color: var(--success); }
  .file-status.error    { color: var(--error); }

  /* progress bar */
  .progress-wrap {
    display: none;
    margin-top: 1rem;
    background: var(--olive-100);
    border-radius: 2px;
    height: 4px;
    overflow: hidden;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--olive-600);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  /* status message */
  .status-msg {
    margin-top: 0.8rem;
    font-size: 11px;
    letter-spacing: 0.08em;
    min-height: 18px;
    color: var(--text-muted);
  }
  .status-msg.success { color: var(--success); }
  .status-msg.error   { color: var(--error); }

  .btn-hint {
    font-size: 10px; font-weight: 400;
    letter-spacing: 0.1em; color: var(--olive-200);
    margin-top: 0.7rem; text-transform: uppercase;
  }

  .footer-note {
    margin-top: 2.5rem;
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--olive-200);
    opacity: 0; animation: fadeIn 1s ease 1.1s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  @media (max-width: 480px) {
    .card { padding: 2.25rem 1.5rem; }
    .names { font-size: 38px; }
    .message { font-size: 15px; }
    .sprig-top, .sprig-bottom { width: 120px; }
  }
</style>
</head>
<body>
<div class="page">

  <svg class="sprig-top" viewBox="0 0 160 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="80" y1="58" x2="80" y2="8" stroke="#8D9660" stroke-width="1" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="52" y2="24" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="28" x2="58" y2="14" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="18" x2="66" y2="8"  stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="108" y2="24" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="28" x2="102" y2="14" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="18" x2="94"  y2="8"  stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <ellipse cx="46" cy="21" rx="7" ry="4" fill="#C8CEA3" transform="rotate(-30 46 21)"/>
    <ellipse cx="54" cy="11" rx="6" ry="3.5" fill="#8D9660" transform="rotate(-20 54 11)"/>
    <ellipse cx="62" cy="5"  rx="5" ry="3"   fill="#C8CEA3" transform="rotate(-10 62 5)"/>
    <ellipse cx="114" cy="21" rx="7" ry="4" fill="#C8CEA3" transform="rotate(30 114 21)"/>
    <ellipse cx="106" cy="11" rx="6" ry="3.5" fill="#8D9660" transform="rotate(20 106 11)"/>
    <ellipse cx="98"  cy="5"  rx="5" ry="3"   fill="#C8CEA3" transform="rotate(10 98 5)"/>
    <circle cx="80" cy="7"  r="2.5" fill="#5C6637"/>
    <circle cx="74" cy="4"  r="1.8" fill="#8D9660"/>
    <circle cx="86" cy="4"  r="1.8" fill="#8D9660"/>
  </svg>

  <div class="card">
    <div class="card-inner">
      <p class="eyebrow">Nunta noastră</p>
      <h1 class="names">
        <em>Alexandra</em>
        <span class="amp">&amp;</span>
        <em>Liviu</em>
      </h1>
      <div class="date-row">
        <div class="date-line-el"></div>
        <span class="date-text">25 iulie 2026</span>
        <div class="date-line-el"></div>
      </div>
      <div class="leaf-divider">
        <div class="leaf-line"></div>
        <div class="leaf-dot"></div>
        <div class="leaf-diamond"></div>
        <div class="leaf-dot"></div>
        <div class="leaf-line"></div>
      </div>
      <p class="message">
        Suntem bucuroși că ești alături de noi<br>
        în această zi de neuitat.<br>
        Trimite-ne amintirile tale din ziua nunții.
      </p>

      <div class="upload-area">
        <input type="file" id="file-input" accept="image/*,video/*" multiple>

        <button class="btn-upload" id="btn-select" onclick="document.getElementById('file-input').click()">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span id="btn-label">Trimite poze &amp; video</span>
        </button>

        <div class="files-preview" id="files-preview"></div>

        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <p class="status-msg" id="status-msg"></p>
        <p class="btn-hint">Fișierele ajung direct în colecția noastră</p>
      </div>
    </div>
  </div>

  <svg class="sprig-bottom" viewBox="0 0 160 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="80" y1="58" x2="80" y2="8" stroke="#8D9660" stroke-width="1" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="52" y2="24" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="28" x2="58" y2="14" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="18" x2="66" y2="8"  stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="108" y2="24" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="28" x2="102" y2="14" stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="80" y1="18" x2="94"  y2="8"  stroke="#8D9660" stroke-width="0.8" stroke-linecap="round"/>
    <ellipse cx="46" cy="21" rx="7" ry="4" fill="#C8CEA3" transform="rotate(-30 46 21)"/>
    <ellipse cx="54" cy="11" rx="6" ry="3.5" fill="#8D9660" transform="rotate(-20 54 11)"/>
    <ellipse cx="62" cy="5"  rx="5" ry="3"   fill="#C8CEA3" transform="rotate(-10 62 5)"/>
    <ellipse cx="114" cy="21" rx="7" ry="4" fill="#C8CEA3" transform="rotate(30 114 21)"/>
    <ellipse cx="106" cy="11" rx="6" ry="3.5" fill="#8D9660" transform="rotate(20 106 11)"/>
    <ellipse cx="98"  cy="5"  rx="5" ry="3"   fill="#C8CEA3" transform="rotate(10 98 5)"/>
    <circle cx="80" cy="7"  r="2.5" fill="#5C6637"/>
    <circle cx="74" cy="4"  r="1.8" fill="#8D9660"/>
    <circle cx="86" cy="4"  r="1.8" fill="#8D9660"/>
  </svg>

  <p class="footer-note">Cu drag &nbsp;·&nbsp; Alexandra &amp; Liviu</p>
</div>

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-7UvOZi1JUi7GNXD20XMSzohKDVS6nwX_5mnw6gqSdOhT1EwBaE92f40ZWDuDYila/exec";

  var fileInput   = document.getElementById("file-input");
  var btnSelect   = document.getElementById("btn-select");
  var btnLabel    = document.getElementById("btn-label");
  var preview     = document.getElementById("files-preview");
  var progressWrap= document.getElementById("progress-wrap");
  var progressBar = document.getElementById("progress-bar");
  var statusMsg   = document.getElementById("status-msg");

  var selectedFiles = [];
  var uploading = false;

  fileInput.addEventListener("change", function() {
    if (!fileInput.files.length) return;
    selectedFiles = Array.from(fileInput.files);
    showPreview();
  });

  function formatSize(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function showPreview() {
    preview.innerHTML = "";
    selectedFiles.forEach(function(file, i) {
      var div = document.createElement("div");
      div.className = "file-item";
      div.id = "file-item-" + i;
      div.innerHTML =
        '<span class="file-name">' + file.name + '</span>' +
        '<span class="file-size">' + formatSize(file.size) + '</span>' +
        '<span class="file-status waiting" id="status-' + i + '">În așteptare</span>';
      preview.appendChild(div);
    });
    preview.classList.add("visible");
    progressWrap.classList.add("visible");
    progressBar.style.width = "0%";
    statusMsg.textContent = "";
    statusMsg.className = "status-msg";

    btnLabel.textContent = "Încarcă " + selectedFiles.length + (selectedFiles.length === 1 ? " fișier" : " fișiere");
    btnSelect.onclick = startUpload;
  }

  function startUpload() {
    if (uploading) return;
    uploading = true;
    btnSelect.disabled = true;
    uploadNext(0, 0);
  }

  function uploadNext(index, doneCount) {
    if (index >= selectedFiles.length) {
      progressBar.style.width = "100%";
      statusMsg.textContent = "✓ Toate fișierele au fost trimise cu succes!";
      statusMsg.className = "status-msg success";
      btnLabel.textContent = "Trimite alte poze & video";
      btnSelect.disabled = false;
      btnSelect.onclick = resetUpload;
      uploading = false;
      return;
    }

    var file = selectedFiles[index];
    var statusEl = document.getElementById("status-" + index);
    statusEl.textContent = "Se încarcă...";
    statusEl.className = "file-status uploading";

    statusMsg.textContent = "Se încarcă " + (index + 1) + " din " + selectedFiles.length + "...";

    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = e.target.result.split(",")[1];
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          fileName: file.name,
          mimeType: file.type,
          fileData: base64
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.status === "ok") {
          statusEl.textContent = "✓ Trimis";
          statusEl.className = "file-status done";
        } else {
          statusEl.textContent = "✗ Eroare";
          statusEl.className = "file-status error";
        }
        var pct = Math.round(((index + 1) / selectedFiles.length) * 100);
        progressBar.style.width = pct + "%";
        uploadNext(index + 1, doneCount + 1);
      })
      .catch(function() {
        statusEl.textContent = "✗ Eroare";
        statusEl.className = "file-status error";
        var pct = Math.round(((index + 1) / selectedFiles.length) * 100);
        progressBar.style.width = pct + "%";
        uploadNext(index + 1, doneCount);
      });
    };
    reader.readAsDataURL(file);
  }

  function resetUpload() {
    selectedFiles = [];
    fileInput.value = "";
    preview.classList.remove("visible");
    preview.innerHTML = "";
    progressWrap.classList.remove("visible");
    progressBar.style.width = "0%";
    statusMsg.textContent = "";
    statusMsg.className = "status-msg";
    btnLabel.innerHTML = "Trimite poze &amp; video";
    btnSelect.disabled = false;
    btnSelect.onclick = function() { document.getElementById("file-input").click(); };
    uploading = false;
  }
</script>
</body>
</html>
